<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea House</title>
    <!-- Google font cdn -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <!-- Bootstrap cdn -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- tailwind cdn -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        clifford: '#da373d',
                    }
                }
            }
        }
    </script>
</head>

<body>
    <!-- Main content -->
    <main class="max-w-screen-xl mx-auto px-16 lg:px-28">

        <!-- Header section -->
        <header class="flex pt-10 mb-20">
            <!-- Text content -->
            <div>
                <h3 class="text-5xl md:text-7xl">It's good <br>
                    tea time at The <br> Tea House</h3>
                <br>  
                <p class="text-gray-500 w-3/4">Tea and Botanical Solutions Supplier Give Optimum Satisfaction To Your Taste Buds.</p>
                <br>
                <button class="bg-gradient-to-r from-orange-500 to-red-500 ... px-5 py-3 rounded-lg text-white font-bold">Explore More <i class="bi bi-arrow-up-right"></i></button>
            </div>
            <!-- Image content -->
             <div class="relative">
                <!-- Image -->
                 <div>
                    <img class="w-full" src="images/banner.png" alt="">
                 </div>
                <!-- Card -->
                 <div class="absolute top-28 md:top-80 md:left-32 lg:left-28
                 flex items-center bg-white shadow-lg px-2 py-2 md:px-10 lg:py-4 rounded-lg">
                    <!-- icon -->
                    <div>
                        <i class="bi bi-star-fill text-amber-500"></i>
                    </div>
                    <!-- Text -->
                    <div class="ml-2">
                        <h2 class="lg:text-2xl font-bold">5.00</h2>
                        <p class="text-gray-500">Trust Pilot Ratings</p>
                    </div>
                 </div>
             </div>
        </header>
    </main>
</body>

</html>
